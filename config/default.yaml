# Self-Improving LLM Knowledge Base - Configuration

ingestion:
  chunk_strategy: "semantic"        # semantic | fixed
  chunk_max_tokens: 512
  chunk_overlap_tokens: 64
  preserve_headings: true
  extract_links: true
  extract_tags: true
  knowledge_dir: "data/knowledge_base"

retrieval:
  dense:
    model_name: "all-MiniLM-L6-v2"
    index_path: "data/indices/faiss.index"
    top_k: 10
  sparse:
    algorithm: "bm25"
    top_k: 10
  hybrid:
    dense_weight: 0.6
    sparse_weight: 0.4
    top_k: 5
  reranker:
    enabled: false
    model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_k: 3

llm:
  provider: "openai"                # openai | local
  model: "gpt-4o-mini"
  temperature: 0.1
  max_tokens: 1024
  system_prompt: |
    You are a knowledgeable assistant that answers questions based strictly on 
    the provided context. If the context does not contain enough information 
    to answer, say so explicitly. Do not hallucinate or invent information.

memory:
  enabled: true
  store_path: "data/memory/interactions.jsonl"
  summary_path: "data/memory/summaries"
  max_history: 1000
  deduplication_threshold: 0.85
  scoring:
    importance_decay: 0.95
    frequency_weight: 0.3
    recency_weight: 0.7

evaluation:
  retrieval_metrics: ["recall@k", "mrr"]
  answer_metrics: ["llm_judge", "heuristic"]
  k_values: [1, 3, 5, 10]

experiment:
  tracking_uri: "mlflow_runs"
  experiment_name: "knowledge_base"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

